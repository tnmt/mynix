done:
  max: 1000
  conditions:
    - merged
    - is_issue && closed
    - "closed && author contains '[bot]'"
    - "closed && author != me && me not in assignees && me not in reviewers"
read:
  max: 1000
  conditions:
    - is_release
    - "author contains '[bot]' && me not in reviewers"
    - "is_pull_request && me not in reviewers && approved"
    - "is_pull_request && draft && me not in reviewers"
open:
  max: 5
  conditions:
    - "is_pull_request && me in reviewers && passed && !approved && open && !draft"
    - "is_pull_request && author == me && open"
    - "is_issue && me in assignees && open"
list:
  max: 1000
  conditions:
    - unread
