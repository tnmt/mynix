name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Check formatting
        run: |
          nix fmt
          git diff --exit-code || (echo "::error::Files are not formatted. Run 'nix fmt' locally." && exit 1)

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: deadnix
        run: nix run nixpkgs#deadnix -- --fail .
      - name: statix
        run: nix run nixpkgs#statix -- check .

  # The pre-commit hook runs `gitleaks protect --staged`, but that is
  # bypassable with --no-verify; scan the full history here as a backstop.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: gitleaks
        run: nix run nixpkgs#gitleaks -- detect --source . --no-banner

  build-nixos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [sunflower, dahlia]
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build NixOS (${{ matrix.host }})
        run: nix build '.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel' --no-link

  # hydrangea cannot be *built* without a macOS runner, but evaluating
  # the full darwin system catches option/module errors on a Linux runner.
  eval-darwin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Evaluate darwin (hydrangea)
        run: nix eval '.#darwinConfigurations.hydrangea.config.system.build.toplevel.drvPath'

  # NOTE: work_mac / work_vm have moved to tnmt-work-flake (private repo)
  # and are validated there.
