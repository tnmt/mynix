name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "secrets/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "secrets/**"
      - ".gitignore"
      - "LICENSE"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Check formatting
        run: |
          nix fmt
          git diff --exit-code || (echo "::error::Files are not formatted. Run 'nix fmt' locally." && exit 1)

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: deadnix
        run: nix run nixpkgs#deadnix -- --fail .
      - name: statix
        run: nix run nixpkgs#statix -- check .

  build-nixos:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [sunflower, dahlia]
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build NixOS (${{ matrix.host }})
        run: nix build '.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel' --no-link

  # NOTE: The following targets are excluded from CI:
  #
  # darwinConfigurations (need macOS runner / aarch64-darwin):
  #   - hydrangea
  #
  # work_mac / work_vm have moved to tnmt-work-flake (private repo) and
  # are validated there.
